app = "ultra-service"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3005"
  NODE_ENV = "production"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3005
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
